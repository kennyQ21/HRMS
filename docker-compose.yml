services:
  vault_migration_service:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      FLASK_ENV: development
    labels:
      - "traefik.enable=true"
      
      # HTTP Router Configuration
      - "traefik.http.routers.vault-router.rule=Host(`datamigration.getpatronus.com`)"
      - "traefik.http.routers.vault-router.entrypoints=websecure"
      - "traefik.http.routers.vault-router.tls=true"
      - "traefik.http.services.vault-service.loadbalancer.server.port=5000"

    networks:
      - traefik_network

networks:
  traefik_network:
    # external: true
